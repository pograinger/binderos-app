<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d1117" />
    <link rel="apple-touch-icon" href="/binderos-app/assets/apple-touch-icon-C2sI7HbX.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/binderos-app/assets/icon-192-DHOZZ9-7.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/binderos-app/assets/icon-512-Bq_0-c-7.png" />
    <title>BinderOS</title>
    <!-- D-16: Content Security Policy — allows self, HuggingFace CDN (D-08), relay endpoints (D-15), WASM -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://huggingface.co https://*.huggingface.co https://api.anthropic.com https://api.openai.com wss://*.workers.dev wss://localhost:* ws://localhost:*; img-src 'self' data: blob:; worker-src 'self' blob:; child-src 'self' blob:;">
    <style>
      /* Native splash — visible INSTANTLY before any JS loads.
         SolidJS removes #native-splash when the app mounts. */
      body { margin: 0; background: #040608; }
      #native-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #040608;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.4s ease-out;
      }
      #native-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #native-splash-inner {
        text-align: center;
        width: min(320px, 80vw);
      }
      #native-splash-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 1.2rem;
        opacity: 0.5;
        animation: splash-pulse 2.4s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.95); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }
      #native-splash-logo {
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: rgba(200, 220, 255, 0.9);
        margin-bottom: 2rem;
      }
      #native-splash-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 1rem;
      }
      #native-splash-fill {
        height: 100%;
        width: 5%;
        background: rgba(100, 180, 255, 0.6);
        border-radius: 2px;
        transition: width 0.3s ease-out;
      }
      #native-splash-status {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.4);
        min-height: 1.2em;
      }
    </style>
    <script type="module" crossorigin src="/binderos-app/assets/index-DwiQ5yRy.js"></script>
    <link rel="stylesheet" crossorigin href="/binderos-app/assets/index-brdPi_7R.css">
  <link rel="manifest" href="/binderos-app/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/binderos-app/registerSW.js"></script></head>
  <body>
    <!-- D-13/COOP/COEP: coi-serviceworker disabled — was causing worker init failures on GitHub Pages.
         SharedArrayBuffer not available without COOP/COEP, so WASM runs single-threaded.
         TODO: Re-enable when deployment moves to a platform that supports response headers natively. -->
    <!-- <script src="./coi-serviceworker.js"></script> -->
    <!-- Native splash: shows before ANY JS loads -->
    <div id="native-splash">
      <div id="native-splash-inner">
        <img id="native-splash-icon" src="icons/orb-closed.png" alt="" />
        <div id="native-splash-logo">BinderOS</div>
        <div id="native-splash-track">
          <div id="native-splash-fill"></div>
        </div>
        <div id="native-splash-status">Loading...</div>
      </div>
    </div>
    <script>
      // Inline progress updater — runs before module scripts load
      (function() {
        var fill = document.getElementById('native-splash-fill');
        var status = document.getElementById('native-splash-status');
        var progress = 5;

        function update(pct, msg) {
          progress = Math.max(progress, pct);
          if (fill) fill.style.width = progress + '%';
          if (status) status.textContent = msg;
        }

        // Expose to SolidJS app for updates
        window.__splashUpdate = update;

        // Dismiss function — called by SolidJS when ready
        window.__splashDismiss = function() {
          var el = document.getElementById('native-splash');
          if (el) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 500);
          }
        };

        // Auto-progress: simulate loading stages before JS takes over
        setTimeout(function() { update(10, 'Loading scripts...'); }, 200);
        setTimeout(function() { update(20, 'Initializing...'); }, 1000);
        setTimeout(function() { update(25, 'Starting workers...'); }, 3000);

        // Safety: force dismiss after 120s no matter what
        setTimeout(function() { window.__splashDismiss(); }, 120000);

        // Dismiss native splash once SolidJS bundle loads (AuthGate needs to be visible).
        // The AuthGate sits at z-index 9999, native splash at 99999 — must clear for auth.
        document.addEventListener('DOMContentLoaded', function() {
          // Give SolidJS a moment to render the AuthGate, then dismiss native splash
          setTimeout(function() { window.__splashDismiss(); }, 500);
        });
      })();
    </script>
    <div id="root"></div>
  </body>
</html>
